# Master hyperparameters — Contrastive Landscape Signatures v2

project_name: "baukultur_vpr_v2"

data:
  grid_size_meters: 50
  spiral_fallback_radius_meters: 250
  image_width: 4096
  image_height: 2048
  shard_max_size_gb: 1.0
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]
  output_shards_dir: "/home/jubooz/landscape_signatures/baukultur_vpr/data/shards"

model:
  encoder:
    name: "dinov3_vith16plus"
    local_weights_path: "/home/jubooz/landscape_signatures/baukultur_vpr/models/weights/dinov3_vith16plus_pretrain_lvd1689m-7c1da9a5.pth"
    patch_size: 16
    embed_dim: 1280                            # ViT-Huge hidden dim
    freeze_weights: true
    precision: "bfloat16"
    use_flash_attention: true
  aggregator:
    output_dim: 1280

lora:
  r: 16
  lora_alpha: 32
  target_modules: null          # null = auto-detect from backbone
  use_dora: true

contrastive:
  temperature: 0.07
  safe_radius_meters: 100.0

training:
  batch_size: 16                # Micro-batch — effective batch = 16 × 16 = 256 via grad accum
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  resized_crop_scale: [0.7, 1.0]
  color_jitter: 
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.05
  learning_rate: 5.0e-4
  num_epochs: 10
  weight_decay: 0.05
  num_workers: 8
  gradient_clip: 1.0
  shuffle_buffer: 2500

wandb:
  project: "baukultur_vpr_v2"
  entity: null
  offline: false
